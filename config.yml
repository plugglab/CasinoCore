# CasinoCore Configuration
# This file is a documented copy of the active plugin config.
# Booleans use true/false. Money values use decimals. Time values are noted in each section.

settings:
  # Enables extra console logging for troubleshooting.
  debug: false
  # Currency symbol shown in messages and GUIs.
  currency-symbol: "$"
  # Uses Vault economy if Vault and an economy plugin are installed.
  use-vault: true
  # Default language file from the plugin lang folder.
  language: "en"

build:
  # Distribution/build label used by this packaged copy.
  variant: "protected"
  # Enables internal protection-related features for this build.
  protection-enabled: true
  # Enables demo/testing-only behavior if supported by the build.
  demo-enabled: false

license:
  # License key provided by your licensing system.
  key: "replace-with-license-key"
  # Owner or customer name tied to the license.
  owner: ""
  # Optional server identifier used during validation.
  server-id: ""
  instance:
    # File used to persist the generated instance id for this installation.
    file: "instance-id.txt"
  api:
    # Remote endpoint used to validate the license.
    validate-url: "https://your-domain.example/api/casinocore/validate"
    # HTTP timeout for validation requests in milliseconds.
    timeout-ms: 10000
    # How often to refresh license validation in minutes.
    refresh-interval-minutes: 15
    # Grace period allowed without successful validation, in minutes.
    offline-grace-minutes: 1440
    # User-Agent sent with validation requests.
    user-agent: "CasinoCore-License/1.0"
  cache:
    # File used to cache the last known valid license response.
    file: "license-cache.yml"
  public-key:
    # RSA public key used to verify signed license responses.
    lines:
      - "-----BEGIN PUBLIC KEY-----"
      - "MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAwCIIN+UWqyW1pWj77YbG"
      - "fhKzXIIEcQDMHFIkTwesP3iiwLH2lmIsA21WeBy4/SnaNk2EMhyoqBL8ekBRPvlC"
      - "f1eCUyeR9W+r9XKH48A4jC0e9W11ufDusCTx+cBJLidCqYN2KEicrseuvG1A1+UZ"
      - "AH9q25z4y9BjlVM83HWQ3EUtZHXq4TNOg0mSh0eCz9IDtHiO8YBgfdx1LiCn+Rch"
      - "J5ggdGWsMkN+n4Y6JfWGf4JrnyftBFuuaLm245f4jSH6XkZ0kLfvOCOMwFjXRAYF"
      - "Sg3fnnkfLOCOCeuAnSg+7VYm1WDCb2TF0bwMPt0Ml0QGWksnqyo16kvMnOQynEvn"
      - "HwIDAQAB"
      - "-----END PUBLIC KEY-----"

broadcasts:
  big-win:
    # Sends a server-wide message when a player wins at least min-payout.
    enabled: true
    # Minimum payout required before the broadcast is sent.
    min-payout: 1000.0
    # Available placeholders: {player}, {amount}, {game}
    message: "<gold><bold>{player}</bold></gold> won <green>{amount}</green> in <yellow>{game}</yellow>!"

economy:
  # Global fallback minimum bet for all games.
  min-bet: 10.0
  # Global fallback maximum bet for all games.
  max-bet: 10000.0
  # Starting balance used by systems that rely on the plugin's internal default value.
  default-balance: 1000.0

daily-rewards:
  # Value granted by the daily reward free spin feature.
  free-spin-value: 100.0

cooldowns:
  # Default delay in seconds between game actions if no game-specific cooldown exists.
  global: 5
  games:
    # Per-game cooldowns in seconds.
    coinflip: 3
    dice: 5
    lottery: 10
    blackjack: 5
    roulette: 5
    slots: 15
    horserace: 8
    wheel: 6

house-edge:
  # Master switch for documented house-edge configuration.
  enabled: true
  mode: "documented"
  # Global fallback house edge percentage if a game-specific value is missing.
  global-percent: 3.0
  games:
    coinflip: 0.0
    dice: 2.0
    lottery: 8.0
    blackjack: 1.5
    roulette: 2.7
    slots: 6.0
    horserace: 7.0
    wheel: 5.0

anti-abuse:
  # Master switch for safety checks against spam, session abuse, and risky betting patterns.
  enabled: true
  max-open-sessions-per-player: 1
  max-consecutive-losses-warning: 10
  max-bet-percent-of-balance: 50.0
  bet-window:
    # Rolling time window used for total-bet checks.
    window-seconds: 60
    # Maximum total amount a player can bet during the window.
    max-total-bet: 10000.0
  click-spam:
    # Minimum allowed interval between GUI clicks in milliseconds.
    min-click-interval-ms: 150
  rate-limits:
    # Maximum command executions per 10 seconds.
    commands-per-10-seconds: 20
    # Maximum game starts allowed per minute.
    game-starts-per-minute: 30
  coinflip:
    prevent-self-join: true
    require-both-online: true
    refund-on-disconnect: true
  roulette:
    block-inventory-close-during-spin: false
  blackjack:
    block-inventory-close-during-round: true
  slots:
    block-inventory-close-during-spin: true
  horserace:
    block-inventory-close-during-race: false

games:
  coinflip:
    enabled: true
    description: "Create a wager and let another player join for a 50/50 flip."
    limits:
      min-bet: 10.0
      max-bet: 5000.0
    chances:
      creator-win: 50.0
      joiner-win: 50.0
    multipliers:
      winner-payout: 1.9
    # Seconds before an open coinflip offer expires.
    offer-expiry-seconds: 60
    house-edge-adjustment-percent: 0.0

  dice:
    enabled: true
    description: "Roll 1-100 and beat the threshold."
    limits:
      min-bet: 10.0
      max-bet: 5000.0
    animation:
      result-delay-ticks: 20
    risk:
      low:
        threshold: 45
        chance-to-win-percent: 55.0
        multiplier: 1.64
      medium:
        threshold: 65
        chance-to-win-percent: 35.0
        multiplier: 2.57
      high:
        threshold: 85
        chance-to-win-percent: 15.0
        multiplier: 6.0
    house-edge-adjustment-percent: 2.0

  lottery:
    enabled: true
    description: "Match the winning number as closely as possible."
    limits:
      min-bet: 10.0
      max-bet: 2500.0
    roll-range:
      min: 1
      max: 100
    chances:
      exact-match-percent: 1.0
      close-match-percent: 10.0
      near-match-percent: 20.0
    payouts:
      exact-match: 32.0
      close-match: 4.5
      near-match: 2.2
    match-ranges:
      exact: 0
      close: 5
      near: 10
    house-edge-adjustment-percent: 8.0

  blackjack:
    enabled: true
    description: "Beat the dealer without going over 21."
    limits:
      min-bet: 25.0
      max-bet: 5000.0
    payouts:
      blackjack: 2.2
      win: 1.9
      push: 1.0
      loss: 0.0
    dealer:
      hit-soft-17: false
      stand-on-hard-17-plus: true
    deck:
      decks: 1
      reshuffle-every-round: true
    rules:
      natural-blackjack-beats-21: true
      push-on-both-blackjack: true
    chances:
      natural-blackjack-reference-percent: 4.83
    house-edge-adjustment-percent: 1.5

  highlow:
    enabled: true
    description: "Guess if the next card is higher or lower."
    limits:
      min-bet: 10.0
      max-bet: 3000.0
    payouts:
      win: 1.95
    animation:
      reveal-steps: 10
    house-edge-adjustment-percent: 2.5

  doubleup:
    enabled: true
    description: "Cash out now or risk everything to double again."
    limits:
      min-bet: 10.0
      max-bet: 3500.0
    chance-to-double-percent: 50.0
    starting-multiplier: 1.6
    house-edge-adjustment-percent: 4.0

  treasure:
    enabled: true
    description: "Pick one chest from the row and hope it holds the treasure."
    limits:
      min-bet: 10.0
      max-bet: 3000.0
    payouts:
      win: 4.2
    house-edge-adjustment-percent: 3.0

  roulette:
    enabled: true
    description: "Pick a number, color, or parity in the roulette GUI."
    limits:
      min-bet: 10.0
      max-bet: 5000.0
    animation:
      update-interval-ticks: 2
      extra-loops: 3
    chances:
      single-number-percent: 2.70
      red-percent: 48.65
      black-percent: 48.65
      even-percent: 48.65
      odd-percent: 48.65
      zero-percent: 2.70
    payouts:
      single-number: 35.0
      red-black: 1.9
      even-odd: 1.9
    # Visual/logic wheel order used for roulette spin resolution.
    wheel-order:
      - 0
      - 32
      - 15
      - 19
      - 4
      - 21
      - 2
      - 25
      - 17
      - 34
      - 6
      - 27
      - 13
      - 36
      - 11
      - 30
      - 8
      - 23
      - 10
      - 5
      - 24
      - 16
      - 33
      - 1
      - 20
      - 14
      - 31
      - 9
      - 22
      - 18
      - 29
      - 7
      - 28
      - 12
      - 35
      - 3
      - 26
    weights:
      # Relative weight for each roulette number. Keep all at 1.0 for a fair table.
      0: 1.0
      1: 1.0
      2: 1.0
      3: 1.0
      4: 1.0
      5: 1.0
      6: 1.0
      7: 1.0
      8: 1.0
      9: 1.0
      10: 1.0
      11: 1.0
      12: 1.0
      13: 1.0
      14: 1.0
      15: 1.0
      16: 1.0
      17: 1.0
      18: 1.0
      19: 1.0
      20: 1.0
      21: 1.0
      22: 1.0
      23: 1.0
      24: 1.0
      25: 1.0
      26: 1.0
      27: 1.0
      28: 1.0
      29: 1.0
      30: 1.0
      31: 1.0
      32: 1.0
      33: 1.0
      34: 1.0
      35: 1.0
      36: 1.0
    house-edge-adjustment-percent: 2.7

  slots:
    enabled: true
    description: "Spin the slot machine and match symbols."
    limits:
      min-bet: 25.0
      max-bet: 2500.0
    chances:
      three-of-a-kind-reference-percent: 8.0
      two-of-a-kind-reference-percent: 22.0
      no-match-reference-percent: 70.0
    payouts:
      three-of-a-kind:
        diamond: 50.0
        emerald: 25.0
        gold: 15.0
        iron: 10.0
        redstone: 5.0
        lapis: 5.0
        coal: 3.0
        apple: 3.0
      two-of-a-kind:
        diamond: 10.0
        emerald: 5.0
        gold: 3.0
        iron: 2.0
        redstone: 2.0
        lapis: 2.0
        coal: 1.5
        apple: 1.5
    symbols:
      # Lower weight means rarer symbol.
      diamond:
        weight: 1
      emerald:
        weight: 5
      gold:
        weight: 8
      iron:
        weight: 12
      redstone:
        weight: 15
      lapis:
        weight: 15
      coal:
        weight: 20
      apple:
        weight: 24
    animation:
      reel-1-stop: 40
      reel-2-stop: 60
      reel-3-stop: 80
      update-interval: 2
    house-edge-adjustment-percent: 6.0

  horserace:
    enabled: true
    description: "Choose a horse, watch the race, and win if your runner finishes first."
    limits:
      min-bet: 25.0
      max-bet: 4000.0
    horses:
      # Horse entries define display name, relative win weight, and payout multiplier.
      blaze:
        name: "Blaze"
        weight: 28.0
        multiplier: 1.8
      comet:
        name: "Comet"
        weight: 24.0
        multiplier: 2.1
      thunder:
        name: "Thunder"
        weight: 19.0
        multiplier: 2.6
      shadow:
        name: "Shadow"
        weight: 16.0
        multiplier: 3.0
      storm:
        name: "Storm"
        weight: 13.0
        multiplier: 3.8
    house-edge-adjustment-percent: 7.0

  wheel:
    enabled: true
    description: "Spin a weighted prize wheel with safe slices and jackpot slices."
    limits:
      min-bet: 25.0
      max-bet: 3500.0
    segments:
      # Wheel segment label shown to players, payout multiplier, and weight.
      bust:
        label: "Bust"
        multiplier: 0.0
        weight: 34.0
      safe_return:
        label: "Safe Return"
        multiplier: 1.1
        weight: 28.0
      hot_table:
        label: "Hot Table"
        multiplier: 1.8
        weight: 18.0
      lucky_strike:
        label: "Lucky Strike"
        multiplier: 3.0
        weight: 12.0
      jackpot_slice:
        label: "Jackpot Slice"
        multiplier: 5.0
        weight: 8.0
    house-edge-adjustment-percent: 5.0
