# CasinoCore Configuration
# This file controls plugin behavior, game balance, protections, and integrations.
# Booleans use true/false. Money values use decimals. Time values are noted in each section.

settings:
  # Enables extra console logging for troubleshooting.
  debug: false
  # Currency symbol shown in messages and GUIs.
  currency-symbol: "$"
  # Uses Vault economy if Vault and an economy plugin are installed.
  # Disable this only if you handle balances another way.
  use-vault: true
  # Default language file from lang.
  language: "en"

version-checker:
  # Enables the startup check for newer plugin versions.
  enabled: true

integrations:
  worldguard:
    # Restricts casino usage to allowed WorldGuard regions.
    enabled: false
    # Region ids where casino features are allowed when WorldGuard support is enabled.
    allowed-regions: []

broadcasts:
  big-win:
    # Sends a server-wide message when a player wins at least min-payout.
    enabled: true
    # Minimum payout required before the broadcast is sent.
    min-payout: 10000.0
    # Available placeholders: {player}, {amount}, {game}
    message: "<gold><bold>{player}</bold></gold> won <green>{amount}</green> in <yellow>{game}</yellow>!"

economy:
  # Global fallback minimum bet for all games.
  min-bet: 10.0
  # Global fallback maximum bet for all games.
  max-bet: 10000.0
  # Starting balance used by systems that rely on the plugin's internal default value.
  default-balance: 1000.0

daily-rewards:
  # Value granted by the daily reward free spin feature.
  # Set to 0.0 to effectively disable the reward amount.
  free-spin-value: 0.0

cooldowns:
  # Default delay in seconds between game actions if no game-specific cooldown exists.
  global: 5
  games:
    # Per-game cooldowns in seconds.
    coinflip: 3
    dice: 5
    lottery: 10
    blackjack: 5
    roulette: 5
    slots: 15
    horserace: 8
    wheel: 6

house-edge:
  # Master switch for documented house-edge configuration.
  enabled: true
  # Current mode label used by the plugin for balancing strategy metadata.
  mode: "documented"
  # Global fallback house edge percentage if a game-specific value is missing.
  global-percent: 3.0
  games:
    # Extra edge tuning per game, expressed as percent.
    coinflip: 0.0
    dice: 2.0
    lottery: 8.0
    blackjack: 1.5
    roulette: 2.7
    slots: 6.0
    horserace: 7.0
    wheel: 5.0

anti-abuse:
  # Master switch for safety checks against spam, session abuse, and risky betting patterns.
  enabled: true
  # Maximum simultaneous active sessions per player.
  max-open-sessions-per-player: 1
  # Number of consecutive losses before the plugin can warn the player.
  max-consecutive-losses-warning: 10
  # Caps a bet to this percent of the player's current balance.
  max-bet-percent-of-balance: 50.0
  bet-window:
    # Rolling time window used for total-bet checks.
    window-seconds: 60
    # Maximum total amount a player can bet during the window.
    max-total-bet: 10000.0
  click-spam:
    # Minimum allowed interval between GUI clicks in milliseconds.
    min-click-interval-ms: 150
  rate-limits:
    # Maximum command executions per 10 seconds.
    commands-per-10-seconds: 20
    # Maximum game starts allowed per minute.
    game-starts-per-minute: 30
  coinflip:
    # Blocks a player from joining their own coinflip.
    prevent-self-join: true
    # Requires both players to stay online until the flip is resolved.
    require-both-online: true
    # Refunds the bet if a participant disconnects mid-session.
    refund-on-disconnect: true
  roulette:
    # Prevents closing the roulette inventory while the wheel is spinning.
    block-inventory-close-during-spin: false
  blackjack:
    # Prevents leaving the blackjack GUI during an active round.
    block-inventory-close-during-round: true
  slots:
    # Prevents leaving the slot GUI during an active spin.
    block-inventory-close-during-spin: true
  horserace:
    # Prevents leaving the horse race GUI during the race animation.
    block-inventory-close-during-race: false

games:
  coinflip:
    # Enables or disables this game entirely.
    enabled: true
    # Short admin-facing summary of the game.
    description: "Create a wager and let another player join for a 50/50 flip."
    limits:
      # Minimum bet for this specific game.
      min-bet: 10.0
      # Maximum bet for this specific game.
      max-bet: 5000.0
    chances:
      # Base win chance for the creator. Keep creator and joiner at 50/50 for a fair flip.
      creator-win: 50.0
      # Base win chance for the joiner.
      joiner-win: 50.0
    multipliers:
      # Amount paid to the winner as a multiplier of the stake.
      winner-payout: 1.9
    # Seconds before an open coinflip offer expires.
    offer-expiry-seconds: 60
    # Additional balancing override for this game.
    house-edge-adjustment-percent: 0.0

  dice:
    enabled: true
    description: "Roll 1-100 and beat the threshold."
    limits:
      min-bet: 10.0
      max-bet: 5000.0
    animation:
      # Delay before the dice result is revealed, in server ticks.
      result-delay-ticks: 20
    risk:
      low:
        # Player must roll above this value to win this risk tier.
        threshold: 45
        # Reference win chance used for balancing/documentation.
        chance-to-win-percent: 55.0
        # Payout multiplier on win.
        multiplier: 1.64
      medium:
        threshold: 65
        chance-to-win-percent: 35.0
        multiplier: 2.57
      high:
        threshold: 85
        chance-to-win-percent: 15.0
        multiplier: 6.0
    house-edge-adjustment-percent: 2.0

  lottery:
    enabled: true
    description: "Match the winning number as closely as possible."
    limits:
      min-bet: 10.0
      max-bet: 2500.0
    roll-range:
      # Inclusive number range used by the lottery draw.
      min: 1
      max: 250
    chances:
      # Reference percentages for exact, close, and near outcomes.
      exact-match-percent: 0.5
      close-match-percent: 5.0
      near-match-percent: 10.0
    payouts:
      # Payout multipliers for each match quality.
      exact-match: 16.0
      close-match: 2.5
      near-match: 1.6
    match-ranges:
      # Distance from the winning number that counts as each result.
      exact: 0
      close: 5
      near: 10
    house-edge-adjustment-percent: 8.0

  blackjack:
    enabled: true
    description: "Beat the dealer without going over 21."
    limits:
      min-bet: 25.0
      max-bet: 5000.0
    payouts:
      # Multipliers for each round outcome.
      blackjack: 2.2
      win: 1.9
      push: 1.0
      loss: 0.0
    dealer:
      # If true, dealer hits on a soft 17.
      hit-soft-17: false
      # If true, dealer stands on all hard totals of 17 or more.
      stand-on-hard-17-plus: true
    deck:
      # Number of decks used in blackjack calculations.
      decks: 1
      # Reshuffles before every round instead of using a persistent shoe.
      reshuffle-every-round: true
    rules:
      # If true, a natural blackjack beats a normal 21 total.
      natural-blackjack-beats-21: true
      # If true, dealer and player natural blackjacks end in a push.
      push-on-both-blackjack: true
    chances:
      # Reference chance for informational balancing only.
      natural-blackjack-reference-percent: 4.83
    house-edge-adjustment-percent: 1.5

  highlow:
    enabled: true
    description: "Guess if the next card is higher or lower."
    limits:
      min-bet: 10.0
      max-bet: 3000.0
    payouts:
      win: 1.95
    animation:
      # Number of visual reveal steps before the next card is shown.
      reveal-steps: 10
    house-edge-adjustment-percent: 2.5

  doubleup:
    enabled: true
    description: "Cash out now or risk everything to double again."
    limits:
      min-bet: 10.0
      max-bet: 3500.0
    # Chance that the current pot successfully doubles.
    chance-to-double-percent: 50.0
    # Multiplier applied when the double-up session starts.
    starting-multiplier: 1.6
    house-edge-adjustment-percent: 4.0

  treasure:
    enabled: true
    description: "Pick one chest from the row and hope it holds the treasure."
    limits:
      min-bet: 10.0
      max-bet: 3000.0
    payouts:
      win: 4.2
    house-edge-adjustment-percent: 3.0

  roulette:
    enabled: true
    description: "Pick a number, color, or parity in the roulette GUI."
    limits:
      min-bet: 10.0
      max-bet: 5000.0
    animation:
      # Tick interval between wheel animation updates.
      update-interval-ticks: 2
      # Additional loops before the wheel stops.
      extra-loops: 3
    chances:
      # Reference win percentages for supported roulette bet types.
      single-number-percent: 2.70
      red-percent: 48.65
      black-percent: 48.65
      even-percent: 48.65
      odd-percent: 48.65
      zero-percent: 2.70
    payouts:
      # Payout multipliers by bet type.
      single-number: 35.0
      red-black: 1.9
      even-odd: 1.9
    # Visual/logic wheel order used for roulette spin resolution.
    wheel-order:
      - 0
      - 32
      - 15
      - 19
      - 4
      - 21
      - 2
      - 25
      - 17
