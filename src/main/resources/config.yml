      22: 1.0
      23: 1.0
      24: 1.0
      25: 1.0
      26: 1.0
      27: 1.0
      28: 1.0
      29: 1.0
      30: 1.0
      31: 1.0
      32: 1.0
      33: 1.0
      34: 1.0
      35: 1.0
      36: 1.0
    house-edge-adjustment-percent: 2.7

  slots:
    enabled: true
    description: "Spin the slot machine and match symbols."
    limits:
      min-bet: 25.0
      max-bet: 2500.0
    chances:
      # Reference odds used for balance documentation.
      three-of-a-kind-reference-percent: 8.0
      two-of-a-kind-reference-percent: 22.0
      no-match-reference-percent: 70.0
    payouts:
      three-of-a-kind:
        # Payout multiplier for 3 matching symbols.
        diamond: 50.0
        emerald: 25.0
        gold: 15.0
        iron: 10.0
        redstone: 5.0
        lapis: 5.0
        coal: 3.0
        apple: 3.0
      two-of-a-kind:
        # Payout multiplier for exactly 2 matching symbols.
        diamond: 10.0
        emerald: 5.0
        gold: 3.0
        iron: 2.0
        redstone: 2.0
        lapis: 2.0
        coal: 1.5
        apple: 1.5
    symbols:
      # Lower weight means rarer symbol.
      diamond:
        weight: 1
      emerald:
        weight: 5
      gold:
        weight: 8
      iron:
        weight: 12
      redstone:
        weight: 15
      lapis:
        weight: 15
      coal:
        weight: 20
      apple:
        weight: 24
    animation:
      # Tick counts that control when each reel stops.
      reel-1-stop: 40
      reel-2-stop: 60
      reel-3-stop: 80
      # Tick interval between frame updates.
      update-interval: 2
    house-edge-adjustment-percent: 6.0

  horserace:
    enabled: true
    description: "Choose a horse, watch the race, and win if your runner finishes first."
    limits:
      min-bet: 25.0
      max-bet: 4000.0
    horses:
      # Horse entries define display name, relative win weight, and payout multiplier.
      blaze:
        name: "Blaze"
        weight: 28.0
        multiplier: 1.8
      comet:
        name: "Comet"
        weight: 24.0
        multiplier: 2.1
      thunder:
        name: "Thunder"
        weight: 19.0
        multiplier: 2.6
      shadow:
        name: "Shadow"
        weight: 16.0
        multiplier: 3.0
      storm:
        name: "Storm"
        weight: 13.0
        multiplier: 3.8
    house-edge-adjustment-percent: 7.0

  wheel:
    enabled: true
    description: "Spin a weighted prize wheel with safe slices and jackpot slices."
    limits:
      min-bet: 25.0
      max-bet: 3500.0
    segments:
      # Wheel segment label shown to players, payout multiplier, and weight.
      bust:
        label: "Bust"
        multiplier: 0.0
        weight: 34.0
      safe_return:
        label: "Safe Return"
        multiplier: 1.1
        weight: 28.0
      hot_table:
        label: "Hot Table"
        multiplier: 1.8
        weight: 18.0
      lucky_strike:
        label: "Lucky Strike"
        multiplier: 3.0
        weight: 12.0
      jackpot_slice:
        label: "Jackpot Slice"
        multiplier: 5.0
        weight: 8.0
    house-edge-adjustment-percent: 5.0
